<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Life is short</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #000;
    overflow: hidden;
    font-family: monospace;
}

/* ================= CENTER TEXT ================= */
.text {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #00ff88;
    font-size: 3.5rem;
    font-weight: bold;
}

.text::after {
    content: "_";
    margin-left: 3px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* ================= BACKGROUND ================= */
#notes {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* ================= FLOAT CONTAINER ================= */
.node {
    position: absolute;
    animation: float 10s ease-in-out infinite;
}

/* ================= CARD ================= */
.note {
    width: fit-content;
    max-width: 320px;
    min-width: 120px;
    padding: 10px 12px;

    border-radius: 14px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    box-shadow:
        0 8px 24px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.08);

    color: rgba(255,255,255,0.85);
    font-size: 0.65rem;

    overflow: hidden;

    word-break: break-word;
}

/* ================= THEMES ================= */
.note.t1  { background: rgba(0,255,136,0.07); }
.note.t2  { background: rgba(255,80,80,0.07); }
.note.t3  { background: rgba(120,120,255,0.07); }

.note.t4  { background: rgba(255,200,0,0.07); }
.note.t5  { background: rgba(255,0,200,0.07); }
.note.t6  { background: rgba(0,200,255,0.07); }
.note.t7  { background: rgba(180,255,0,0.07); }
.note.t8  { background: rgba(255,120,0,0.07); }
.note.t9  { background: rgba(0,120,255,0.07); }
.note.t10 { background: rgba(200,0,255,0.07); }

.note.t11 { background: rgba(0,255,200,0.07); }
.note.t12 { background: rgba(255,60,120,0.07); }
.note.t13 { background: rgba(120,255,60,0.07); }
.note.t14 { background: rgba(60,120,255,0.07); }
.note.t15 { background: rgba(255,160,60,0.07); }

.note.t16 { background: rgba(160,60,255,0.07); }
.note.t17 { background: rgba(60,255,160,0.07); }
.note.t18 { background: rgba(255,60,60,0.07); }
.note.t19 { background: rgba(60,255,255,0.07); }
.note.t20 { background: rgba(255,255,60,0.07); }

/* ================= CONTENT ================= */
.title {
    text-align: center;
    font-size: 0.8rem;
    margin-bottom: 6px;
    color: #fff;
}

.body {
    line-height: 1.4;
    opacity: 0.85;
}

/* links no underline */
.body a {
    text-decoration: none !important;
    color: #00ff88;
}

/* code */
.body code {
    background: rgba(255,255,255,0.08);
    padding: 2px 4px;
    border-radius: 4px;
}

/* images */
.body img {
    max-width: 100%;
    max-height: 90px;
    display: block;
    margin: 6px auto 0 auto; 
    border-radius: 8px;
    object-fit: contain;
}

/* Footer */
.footer {
    position: absolute;
    bottom: 42px;
    left: 50%;
    transform: translateX(-50%);
}

.footer a {
    color: #00ff88;
    text-decoration: none;

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;

    opacity: 0.55;

    transition: all 0.25s ease;
}

.footer a:hover {
    opacity: 1;
    text-shadow: 0 0 12px rgba(0, 255, 136, 0.8);
    transform: translateY(-2px);
}

/* Stars row */
.stars {
    display: flex;
    align-items: center;
    gap: 8px;

    font-size: 0.95rem;
    letter-spacing: 1px;
}

/* Text row */
.remain {
    font-size: 0.78rem;
    letter-spacing: 2px;
    text-transform: lowercase;
    opacity: 0.8;
}

/* Z-Index */
.text { z-index: 10; }
.footer { z-index: 10; }
#notes { z-index: 1; }

/* ================= FLOAT ANIMATION ================= */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-16px); }
    100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<div class="text">Life is short</div>
<div id="notes"></div>
<div class="footer">
    <a href="https://github.com/devx6/Life-is-short"
        target="_blank"
        rel="noopener noreferrer">

        <!-- Stars -->
        <div class="stars">
            <i class="fa-solid fa-star"></i>
            <!-- <span id="stars">...</span> -->
            <span>⭐</span><span id="stars">...</span>
        </div>

        <!-- Small text -->
        <div class="remain">
            some things remain
        </div>

    </a>
</div>

<script>
const token = "xx"; // optional: for higher rate limits, but not required for public repos with low traffic
const owner = "devx6";
const repo = "Life-is-short";

/* random theme */
function randomTheme() {
    const themes = ["t1", "t2", "t3", "t4", "t5", "t6", "t7", "t8", "t9", "t10", "t11", "t12", "t13", "t14", "t15", "t16", "t17", "t18", "t19", "t20"];
    return themes[Math.floor(Math.random() * themes.length)];
}

/* truncate */
function clamp(t, m=300){
    if(!t) return "";
    return t.length > m ? t.slice(0,m)+"..." : t;
}

/* load stars */
async function loadStars() {
    try {
        const response = await fetch(
            `https://api.github.com/repos/${owner}/${repo}`
        );

        const data = await response.json();

        document.getElementById("stars").textContent =
            data.stargazers_count ?? "0";

    } catch (error) {
        document.getElementById("stars").textContent = "?";
        console.error("Failed to load stars:", error);
    }
}

loadStars();

/* load issues */
async function loadIssues() {
    const res = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/issues?state=open`
    );

    const issues = await res.json();
    const layer = document.getElementById("notes");

    issues
        .filter(i => !i.pull_request)
        .slice(0, 25)
        .forEach(issue => {

            const wrapper = document.createElement("div");
            wrapper.className = "node";

            const link = document.createElement("a");
            link.href = issue.html_url;
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.style.textDecoration = "none";
            link.style.color = "inherit";

            wrapper.style.top = Math.random() * 85 + "%";
            wrapper.style.left = Math.random() * 85 + "%";

            const card = document.createElement("div");

            const theme = randomTheme();
            card.className = "note " + theme;

            card.innerHTML = `
                <div class="title">${issue.title}</div>
                <div class="body">${marked.parse(clamp(issue.body || ""))}</div>
            `;

            link.appendChild(card);
            wrapper.appendChild(link);
            layer.appendChild(wrapper);
        });
}

loadIssues();
</script>

</body>
</html>
